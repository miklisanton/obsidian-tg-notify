name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Compute image ref
        id: image
        run: |
          set -euo pipefail
          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          printf 'repo=%s\n' "$image_repo" >> "$GITHUB_OUTPUT"
          printf 'sha_tag=%s:%s\n' "$image_repo" "$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.repo }}:latest

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust server host key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload compose file
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'mkdir -p ~/apps/obsidian-tg-notify'
          scp -P "$SSH_PORT" deploy/compose.yaml "$SSH_USER@$SSH_HOST:~/apps/obsidian-tg-notify/compose.yaml"

      - name: Deploy compose
        env:
          APP_IMAGE: ${{ steps.image.outputs.sha_tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          {
            printf 'export APP_IMAGE=%q\n' "$APP_IMAGE"
            printf 'export GHCR_USERNAME=%q\n' "$GHCR_USERNAME"
            printf 'export GHCR_TOKEN=%q\n' "$GHCR_TOKEN"
            cat deploy/scripts/deploy-compose.sh
          } | ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" 'export XDG_RUNTIME_DIR="/run/user/$(id -u)"; export DOCKER_HOST="unix://${XDG_RUNTIME_DIR}/docker.sock"; bash -s'
